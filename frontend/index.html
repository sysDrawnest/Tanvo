
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odisha Handloom | Sambalpuri Heritage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Odia:wght@400;700&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
      @tailwind base;
      @tailwind components;
      @tailwind utilities;

      /* Base styles */
      :root {
        --primary-red: #C40C0C;
        --primary-orange: #FF6500;
        --secondary-orange: #CC561E;
        --accent-gold: #F6CE71;
      }

      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #ffffff;
      }

      /* Tailwind custom layer */
      @layer base {
        h1, h2, h3, h4, h5, h6 {
          font-family: 'Playfair Display', serif;
          font-weight: 700;
        }

        /* Custom color variables for Tailwind */
        :root {
          --color-primary-red: 196 12 12;    /* #C40C0C */
          --color-primary-orange: 255 101 0;  /* #FF6500 */
          --color-secondary-orange: 204 86 30; /* #CC561E */
          --color-accent-gold: 246 206 113;   /* #F6CE71 */
        }
      }

      @layer components {
        /* Buttons */
        .btn-primary {
          @apply bg-gradient-to-r from-[#C40C0C] to-[#FF6500] text-white px-8 py-4 rounded-full font-bold uppercase tracking-widest
                 hover:shadow-glow hover:scale-105 transition-all duration-300 
                 focus:outline-none focus:ring-2 focus:ring-[#FF6500]/50 focus:ring-offset-2
                 active:scale-95 text-xs;
        }

        .btn-secondary {
          @apply border-2 border-[#C40C0C] text-[#C40C0C] px-8 py-4 rounded-full font-bold uppercase tracking-widest
                 hover:bg-[#C40C0C] hover:text-white transition-all duration-300 
                 focus:outline-none focus:ring-2 focus:ring-[#C40C0C]/50 focus:ring-offset-2
                 active:scale-95 text-xs;
        }

        .btn-accent {
          @apply bg-[#F6CE71] text-[#CC561E] px-8 py-4 rounded-full font-bold uppercase tracking-widest
                 hover:bg-[#F6CE71]/90 hover:shadow-lg transition-all duration-300
                 focus:outline-none focus:ring-2 focus:ring-[#F6CE71]/50 focus:ring-offset-2 text-xs;
        }

        /* Cards */
        .product-card {
          @apply bg-white rounded-3xl shadow-lg hover:shadow-2xl transition-all duration-500
                 overflow-hidden group hover:-translate-y-2 border border-gray-100;
        }

        .category-card {
          @apply bg-gradient-to-br from-white to-gray-50 rounded-2xl p-8 text-center
                 shadow-lg hover:shadow-2xl transition-all duration-500
                 hover:scale-105 border border-gray-200;
        }

        /* Inputs */
        .input-field {
          @apply w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50
                 focus:outline-none focus:ring-2 focus:ring-[#FF6500]/30 focus:border-[#FF6500] focus:bg-white
                 transition-all duration-200 placeholder-gray-400;
        }

        /* Badges */
        .badge-new {
          @apply absolute top-4 left-4 bg-[#F6CE71] text-[#CC561E] px-3 py-1.5 
                 rounded-full text-[10px] font-black uppercase tracking-widest z-10
                 animate-pulse-gentle shadow-lg;
        }

        .badge-sale {
          @apply absolute top-4 right-4 bg-gradient-to-r from-[#C40C0C] to-[#FF6500] text-white px-3 py-1.5 
                 rounded-full text-[10px] font-black uppercase tracking-widest z-10 shadow-lg;
        }

        /* Layout */
        .container-custom {
          @apply max-w-7xl mx-auto px-4 sm:px-6 lg:px-8;
        }

        .section-padding {
          @apply py-12 md:py-16 lg:py-24;
        }

        /* Navigation */
        .nav-link {
          @apply relative font-bold text-gray-700 hover:text-[#C40C0C] transition-colors duration-300
                 after:content-[''] after:absolute after:left-0 after:-bottom-1 after:w-0 after:h-0.5
                 after:bg-gradient-to-r after:from-[#C40C0C] after:to-[#FF6500] after:transition-all
                 after:duration-300 hover:after:w-full;
        }

        /* Hero section */
        .hero-gradient {
          background: linear-gradient(135deg, rgba(196, 12, 12, 0.03) 0%, rgba(255, 101, 0, 0.03) 50%, rgba(246, 206, 113, 0.03) 100%);
        }

        /* Footer */
        .footer-link {
          @apply text-gray-400 hover:text-[#F6CE71] transition-colors duration-300
                 hover:translate-x-2 inline-block;
        }
      }

      @layer utilities {
        @keyframes float {
          0%, 100% { transform: translateY(0px); }
          50% { transform: translateY(-10px); }
        }

        @keyframes shimmer {
          0% { background-position: -200px 0; }
          100% { background-position: 200px 0; }
        }

        @keyframes slideIn {
          from { transform: translateY(-20px); opacity: 0; }
          to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }

        @keyframes pulse-gentle {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.8; }
        }

        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-shimmer {
          background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
          background-size: 200px 100%;
          animation: shimmer 3s infinite;
        }
        .animate-slideIn { animation: slideIn 0.5s ease-out; }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out; }
        .animate-pulse-gentle { animation: pulse-gentle 2s ease-in-out infinite; }

        .text-gradient-primary {
          background: linear-gradient(135deg, #C40C0C 0%, #FF6500 50%, #CC561E 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        }

        .shadow-glow {
          box-shadow: 0 10px 40px -10px rgba(196, 12, 12, 0.3);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
          background: linear-gradient(to bottom, #FF6500, #C40C0C);
          border-radius: 10px;
        }

        .glass-morphism {
          background: rgba(255, 255, 255, 0.95);
          backdrop-filter: blur(10px);
          -webkit-backdrop-filter: blur(10px);
          border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .no-scrollbar::-webkit-scrollbar {
          display: none;
        }
        .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
        }
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "framer-motion": "https://esm.sh/framer-motion@^12.4.7",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "axios": "https://esm.sh/axios@^1.7.9"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-white text-slate-900 custom-scrollbar">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
